services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: redintel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDINTEL_APP_ENVIRONMENT: production
      REDINTEL_SERVER_HOST: 0.0.0.0
      REDINTEL_SERVER_PORT: 8080
      REDINTEL_DATABASE_HOST: postgres
      REDINTEL_DATABASE_PORT: 5432
      REDINTEL_DATABASE_USER: postgres
      REDINTEL_DATABASE_PASSWORD: postgres
      REDINTEL_DATABASE_NAME: redintel
      REDINTEL_DATABASE_SSLMODE: disable
      REDINTEL_REDIS_HOST: redis
      REDINTEL_REDIS_PORT: 6379
      REDINTEL_LOG_LEVEL: info
      REDINTEL_LOG_FORMAT: json
    ports:
      - "8080:8080"

volumes:
  pgdata:
  redisdata:
